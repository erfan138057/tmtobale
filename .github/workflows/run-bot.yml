name: Telegram to Bale Bot

on:
  schedule:
    - cron: "0 */2 * * *"

  workflow_dispatch:


permissions:
  contents: write


jobs:

  run-bot:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install requirements
        run: |
          pip install -r requirements.txt


      - name: Run bot
        env:
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
          BALE_CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          python bot.py



      - name: Save last ids
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add last_ids.json

          git commit -m "Update last ids" || echo "No changes"

          git push
